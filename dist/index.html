een continents."},{key:"minorContRadMin",def:.06,min:.02,max:.14,label:"Minor continent min radius",desc:"Minimum island/micro-continent size."},{key:"minorContRadRange",def:.07,min:.02,max:.14,label:"Minor continent radius range",desc:"Size variation for minor landmasses."},{key:"majorSubsBase",def:5,min:2,max:10,step:1,label:"Major sub-stamps (base)",desc:"Number of overlapping ellipses composing each major continent. More = complex shape."},{key:"majorSubsRange",def:5,min:0,max:8,step:1,label:"Major sub-stamps (variance)",desc:"Variation in sub-stamp count between continents."},{key:"majorCoreRadMin",def:.12,min:.04,max:.22,label:"Major core radius min",desc:"Size of the central landmass blob. The 'bulk' of each continent."},{key:"majorCoreRadRange",def:.1,min:.02,max:.18,label:"Major core radius range",desc:"Variation in core blob size."},{key:"majorSubRadMin",def:.05,min:.02,max:.12,label:"Major sub radius min",desc:"Size of satellite blobs that create peninsulas and extensions."},{key:"majorSubRadRange",def:.08,min:.02,max:.14,label:"Major sub radius range",desc:"Variation in satellite blob size."},{key:"majorNegsMax",def:2.5,min:0,max:5,label:"Major neg stamps (max)",desc:"Maximum negative stamps per continent. These carve bays and inland seas."},{key:"warpStr1",def:.14,min:.02,max:.3,label:"Coastline warp (large)",desc:"Large-scale organic warping of plate boundaries and coastlines."},{key:"warpStr2",def:.05,min:0,max:.15,label:"Coastline warp (detail)",desc:"Fine detail warping. Adds smaller bends and irregularities."},{key:"jagStr",def:.025,min:0,max:.06,label:"Coastline jaggedness",desc:"Sharp, fractal edge detail on coastlines. Higher = more ragged edges."},{key:"penStrength",def:.2,min:0,max:.5,label:"Peninsula strength",desc:"How strongly peninsula features protrude from coastlines."},{key:"bayStrength",def:.18,min:0,max:.5,label:"Bay strength",desc:"How deeply bay features cut into coastlines."}]},mountains:{label:"Mountains",color:"160,140,180",param
