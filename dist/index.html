ally the plateau fades to lowland. Higher = gentler slopes."},{key:"contOceanFlatCore",def:4,min:0,max:12,step:1,label:"Coastal mtn flat core",desc:"Flat core of coastal mountain ranges before falloff."},{key:"contOceanSigma",def:8,min:2,max:16,step:1,label:"Coastal mtn falloff",desc:"How gradually coastal mountains fade inland."},{key:"blurSigma",def:14,min:4,max:30,step:1,label:"Plateau blur sigma",desc:"Gaussian blur applied to the mountain field. Higher = smoother, wider plateaus."},{key:"plateauMult",def:1.5,min:.5,max:4,label:"Plateau height mult",desc:"Height multiplier for the broad plateau. Directly scales plateau elevation."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},erosion:{label:"Hydraulic Erosion",color:"140,170,130",params:[{key:"erodeDropsPerPixel",def:1,min:0,max:6,label:"Rain density",desc:"Raindrops per coarse cell. More drops = stronger erosion. 0 = no erosion. Runs on 4x-downscaled grid for speed."},{key:"erodeInertia",def:.3,min:0,max:.9,label:"Flow inertia",desc:"How much water keeps its current direction vs following the slope. Low = water follows gradient exactly (sharp valleys). High = smoother, meandering paths."},{key:"erodeCapacity",def:4,min:1,max:20,label:"Sediment capacity",desc:"How much sediment fast-moving water can carry. Higher = deeper valleys carved in steep terrain, more sediment deposited in plains."},{key:"erodeRate",def:.15,min:.05,max:.8,label:"Erosion rate",desc:"How fast water picks up material from the ground. Higher = more aggressive carving of valleys and canyons."},{key:"erodeDeposit",def:.3,min:.05,max:.8,label:"Deposition rate",desc:"How fast sediment is dropped when water slows. Higher = smoother valley floors and wider alluvial plains."},{key:"erodeEvaporate",def:.02,
