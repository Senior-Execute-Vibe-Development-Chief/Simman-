Coastal mtn flat core",desc:"Flat core of coastal mountain ranges before falloff."},{key:"contOceanSigma",def:8,min:2,max:16,step:1,label:"Coastal mtn falloff",desc:"How gradually coastal mountains fade inland."},{key:"blurSigma",def:14,min:4,max:30,step:1,label:"Plateau blur sigma",desc:"Gaussian blur applied to the mountain field. Higher = smoother, wider plateaus."},{key:"plateauMult",def:1.5,min:.5,max:4,label:"Plateau height mult",desc:"Height multiplier for the broad plateau. Directly scales plateau elevation."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},moisture:{label:"Moisture",color:"100,160,180",params:[{key:"moistDecay",def:.993,min:.95,max:1,label:"Inland retention",desc:"How much moisture survives per advection step. Lower = moisture dies faster over land. Higher = penetrates deeper inland. At 0.993, 66% survives 60 steps."},{key:"moistRecycling",def:.25,min:0,max:.5,label:"Transpiration recycling",desc:"How much moisture wet warm land re-evaporates back into the air. Amazon recycles ~40% of its rainfall. Higher = wetter continental interiors."},{key:"moistAdvectWeight",def:.6,min:.2,max:1,label:"Advection weight",desc:"How much the wind-carried moisture contributes to final moisture. The rest comes from wind-from-ocean, convergence, and other factors."},{key:"moistOceanWeight",def:.2,min:0,max:.5,label:"Wind-from-ocean weight",desc:"Bonus moisture when wind traces back to ocean. Higher = stronger coastal wetting that follows wind direction."},{key:"moistTerrainBlock",def:.4,min:0,max:.9,label:"Terrain blocking",desc:"How much mountains strip moisture from the airstream. Higher = stronger rain shadows. 0 = mountains don't block moisture at all."},{key:"moistElevDry",def:2,min:0,max:5,label:"Elevation drying"
