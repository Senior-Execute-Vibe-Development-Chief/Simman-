ns. Like the Tibetan Plateau."},{key:"contContSigma",def:10,min:3,max:25,step:1,label:"Plateau falloff sigma",desc:"How gradually the plateau fades to lowland. Higher = gentler slopes."},{key:"contOceanFlatCore",def:4,min:0,max:12,step:1,label:"Coastal mtn flat core",desc:"Flat core of coastal mountain ranges before falloff."},{key:"contOceanSigma",def:8,min:2,max:16,step:1,label:"Coastal mtn falloff",desc:"How gradually coastal mountains fade inland."},{key:"blurSigma",def:14,min:4,max:30,step:1,label:"Plateau blur sigma",desc:"Gaussian blur applied to the mountain field. Higher = smoother, wider plateaus."},{key:"plateauMult",def:1.5,min:.5,max:4,label:"Plateau height mult",desc:"Height multiplier for the broad plateau. Directly scales plateau elevation."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},moisture:{label:"Moisture",color:"100,160,180",params:[{key:"moistDecay",def:.993,min:.95,max:1,label:"Inland retention",desc:"How much atmospheric moisture survives per transport step over land. Lower = faster continental drying. Higher = moisture penetrates deeper inland."},{key:"moistRecycling",def:.25,min:0,max:.5,label:"Transpiration recycling",desc:"How much precipitation on warm land re-evaporates back into the atmosphere. Amazon recycles ~40% of its rainfall. Higher = wetter continental interiors."},{key:"moistAdvectWeight",def:.6,min:.2,max:1,label:"Advection reach",desc:"How far wind carries moisture per step. Higher = moisture transported further from ocean sources. Affects how deep inland moisture penetrates."},{key:"moistOceanWeight",def:.2,min:0,max:.5,label:"Ocean evaporation",desc:"Intensity of ocean evaporation. Higher = more moisture enters the atmosphere from warm oceans, creating wetter downwind coastlines
