d extensions."},{key:"majorSubRadRange",def:.08,min:.02,max:.14,label:"Major sub radius range",desc:"Variation in satellite blob size."},{key:"majorNegsMax",def:2.5,min:0,max:5,label:"Major neg stamps (max)",desc:"Maximum negative stamps per continent. These carve bays and inland seas."},{key:"warpStr1",def:.14,min:.02,max:.3,label:"Coastline warp (large)",desc:"Large-scale organic warping of plate boundaries and coastlines."},{key:"warpStr2",def:.05,min:0,max:.15,label:"Coastline warp (detail)",desc:"Fine detail warping. Adds smaller bends and irregularities."},{key:"jagStr",def:.025,min:0,max:.06,label:"Coastline jaggedness",desc:"Sharp, fractal edge detail on coastlines. Higher = more ragged edges."},{key:"penStrength",def:.2,min:0,max:.5,label:"Peninsula strength",desc:"How strongly peninsula features protrude from coastlines."},{key:"bayStrength",def:.18,min:0,max:.5,label:"Bay strength",desc:"How deeply bay features cut into coastlines."}]},mountains:{label:"Mountains",color:"160,140,180",params:[{key:"contContUplift",def:.18,min:.05,max:.35,label:"Cont-cont uplift",desc:"Uplift strength where two continental plates collide. Creates Himalaya-type ranges."},{key:"contOceanUplift",def:.13,min:.03,max:.25,label:"Cont-ocean uplift",desc:"Uplift where ocean plate subducts under continent. Creates Andes-type ranges."},{key:"contContMaxDist",def:60,min:20,max:100,step:1,label:"Cont-cont range",desc:"How far the plateau extends from a cont-cont boundary (in coarse cells). 60 ≈ 1300km."},{key:"contOceanMaxDist",def:25,min:8,max:50,step:1,label:"Cont-ocean range",desc:"How far coastal mountains extend inland. 25 ≈ 550km."},{key:"contContFlatCore",def:10,min:0,max:25,step:1,label:"Plateau flat core",desc:"Radius of the flat top of the plateau before falloff begins. Like the Tibetan Plateau."},{key:"contContSigma",def:10,min:3,max:25,step:1,label:"Plateau falloff sigma",desc:"How gradually the plateau fades to lowland. Higher = gentler slopes."},{key:"contOceanFlatCore",def:4,min:0,max:12,step:1,label:"Coastal mtn flat core",desc:"Flat core of coastal mountain ranges before falloff."},{key:"contOceanSigma",def:8,min:2,max:16,step:1,label:"Coastal mtn falloff",desc:"How gradually coastal mountains fade inland."},{key:"blurSigma",def:14,min:4,max:30,step:1,label:"Plateau blur sigma",desc:"Gaussian blur applied to the mountain field. Higher = smoother, wider plateaus."},{key:"plateauMult",def:1.5,min:.5,max:4,label:"Plateau height mult",desc:"Height multiplier for the broad plateau. Directly scales plateau elevation."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},moisture:{label:"Moisture",color:"100,160,180",params:[{key:"moistDecay",def:.993,min:.95,max:1,label:"Inland retention",desc:"How much atmospheric moisture survives per transport step over land. Lower = faster continental drying. Higher = moisture penetrates deeper inland."},{key:"moistRecycling",def:.25,min:0,max:.5,label:"Transpiration recycling",desc:"How much precipitation on warm land re-evaporates back into the atmosphere. Amazon recycles ~40% of its rainfall. Higher = wetter continental interiors."},{key:"moistAdvectWeight",def:.6,min:.2,max:1,label:"Advection reach",desc:"How far wind carries moisture per step. Higher = moisture transported further from ocean sources. Affects how deep inland moisture penetrates."},{key:"moistOceanWeight",def:.2,min:0,max:.5,label:"Ocean evaporation",desc:"Intensity of ocean evaporation. Higher = more moisture enters the atmosphere from warm oceans, creating wetter downwind coastlines."},{key:"moistTerrainBlock",def:.4,min:0,max:.9,label:"Orographic strength",desc:"How strongly rising terrain forces precipitation. Higher = stronger rain shadows behind mountains. Controls windward rain vs leewa
