ange",def:.1,min:.02,max:.18,label:"Major core radius range",desc:"Variation in core blob size."},{key:"majorSubRadMin",def:.05,min:.02,max:.12,label:"Major sub radius min",desc:"Size of satellite blobs that create peninsulas and extensions."},{key:"majorSubRadRange",def:.08,min:.02,max:.14,label:"Major sub radius range",desc:"Variation in satellite blob size."},{key:"majorNegsMax",def:2.5,min:0,max:5,label:"Major neg stamps (max)",desc:"Maximum negative stamps per continent. These carve bays and inland seas."},{key:"warpStr1",def:.14,min:.02,max:.3,label:"Coastline warp (large)",desc:"Large-scale organic warping of plate boundaries and coastlines."},{key:"warpStr2",def:.05,min:0,max:.15,label:"Coastline warp (detail)",desc:"Fine detail warping. Adds smaller bends and irregularities."},{key:"jagStr",def:.025,min:0,max:.06,label:"Coastline jaggedness",desc:"Sharp, fractal edge detail on coastlines. Higher = more ragged edges."},{key:"penStrength",def:.2,min:0,max:.5,label:"Peninsula strength",desc:"How strongly peninsula features protrude from coastlines."},{key:"bayStrength",def:.18,min:0,max:.5,label:"Bay strength",desc:"How deeply bay features cut into coastlines."}]},mountains:{label:"Mountains",color:"160,140,180",params:[{key:"contContUplift",def:.18,min:.05,max:.35,label:"Cont-cont uplift",desc:"Uplift strength where two continental plates collide. Creates Himalaya-type ranges."},{key:"contOceanUplift",def:.13,min:.03,max:.25,label:"Cont-ocean uplift",desc:"Uplift where ocean plate subducts under continent. Creates Andes-type ranges."},{key:"contContMaxDist",def:60,min:20,max:100,step:1,label:"Cont-cont range",desc:"How far the plateau extends from a cont-cont boundary (in coarse cells). 60 ≈ 1300km."},{key:"contOceanMaxDist",def:25,min:8,max:50,step:1,label:"Cont-ocean range",desc:"How far coastal mountains extend inland. 25 ≈ 550km."},{key:"contContFlatCore",def:10,min:0,max:25,step:1,label:"Plateau flat core",desc:"Radius of the flat top of the plateau before falloff begins. Like the Tibetan Plateau."},{key:"contContSigma",def:10,min:3,max:25,step:1,label:"Plateau falloff sigma",desc:"How gradually the plateau fades to lowland. Higher = gentler slopes."},{key:"contOceanFlatCore",def:4,min:0,max:12,step:1,label:"Coastal mtn flat core",desc:"Flat core of coastal mountain ranges before falloff."},{key:"contOceanSigma",def:8,min:2,max:16,step:1,label:"Coastal mtn falloff",desc:"How gradually coastal mountains fade inland."},{key:"blurSigma",def:14,min:4,max:30,step:1,label:"Plateau blur sigma",desc:"Gaussian blur applied to the mountain field. Higher = smoother, wider plateaus."},{key:"plateauMult",def:1.5,min:.5,max:4,label:"Plateau height mult",desc:"Height multiplier for the broad plateau. Directly scales plateau elevation."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},erosion:{label:"Hydraulic Erosion",color:"140,170,130",params:[{key:"erodeDropsPerPixel",def:1,min:0,max:6,label:"Rain density",desc:"Raindrops per coarse cell. More drops = stronger erosion. 0 = no erosion. Runs on 4x-downscaled grid for speed."},{key:"erodeInertia",def:.3,min:0,max:.9,label:"Flow inertia",desc:"How much water keeps its current direction vs following the slope. Low = water follows gradient exactly (sharp valleys). High = smoother, meandering paths."},{key:"erodeCapacity",def:4,min:1,max:20,label:"Sediment capacity",desc:"How much sediment fast-moving water can carry. Higher = deeper valleys carved in steep terrain, more sediment deposited in plains."},{key:"erodeRate",def:.15,min:.05,max:.8,label:"Erosion rate",desc:"How fast water picks up material from the ground. Higher = more aggressive carving of valleys and canyons."},{key:"erodeDeposit",def:.3,min:.05,max:.8,label:"Deposition rate",desc:"How fast sediment is dropped when water slows. Higher = smoother valley floors and wider alluvial plains."},{key:"erodeEvaporate",def:.02,min:.005,max:.08,label:"Evaporation rate",desc:"Water loss per step. Lower = longer rivers that reach further. Higher = short, steep gullies."},{key:"erodeGravity",def:6,min:1,max:15,label:"Gravity",desc:"Acceleration from height drops. Higher = faster water on slopes, deeper erosion in mountains, more deposition in lowlands."},{key:"erodeBrushRadius",def:2,min:1,max:5,step:1,label:"Erosion radius",desc:"Radius of terrain affected by each raindrop. Larger = wider, smoother valleys. Smaller = sharper, narrower cuts."}]},wind:{label:"Wind & Pressure",color:"130,190,210",params:[{key:"pressureScale",def:.817,min:.05,max:3,label:"Pressure scale",desc:"Strength of temperature-driven pressure gradients. This is the primary control for wind speed — higher pressure differences create faster wind. The physics (Coriolis, friction, terrain) handles the rest."},{key:"thermalContrast",def:.62,min:0,max:2,label:"Land-sea thermal contrast",desc:"How much land heats relative to ocean. Drives monsoon circulations and continental thermal lows. 0 = no land-sea difference. Higher = stronger monsoons and sea breezes."},{key:"hadleyStrength",def:.08,min:0,max:2,label:"Hadley cell strength",desc:"Strength of the global overturning circulation (Hadley, Ferrel, Polar cells). Controls trade winds, subtropical highs, and polar easterlies. 0 = no cells, pure thermal wind."},{key:"coriolisStrength",def:.365,min:.05,max:.5,label:"Coriolis strength",desc:"Planetary rotation effect (2Ω·sin(φ)). Controls how much wind deflects (spirals) vs flowing straight toward low pressure. Higher = more geostrophic (parallel to isobars)."},{key:"itczOffset",def:.033,min:-.1,max:.15,label:"ITCZ offset",desc:"North-south shift of the Intertropical Convergence Zone. Positive = ITCZ shifts north (boreal summer). Negative = shifts south. Affects trade wind asymmetry."},{key:"oce
