ize of the central landmass blob. The 'bulk' of each continent."},{key:"majorCoreRadRange",def:.1,min:.02,max:.18,label:"Major core radius range",desc:"Variation in core blob size."},{key:"majorSubRadMin",def:.05,min:.02,max:.12,label:"Major sub radius min",desc:"Size of satellite blobs that create peninsulas and extensions."},{key:"majorSubRadRange",def:.08,min:.02,max:.14,label:"Major sub radius range",desc:"Variation in satellite blob size."},{key:"majorNegsMax",def:2.5,min:0,max:5,label:"Major neg stamps (max)",desc:"Maximum negative stamps per continent. These carve bays and inland seas."},{key:"warpStr1",def:.14,min:.02,max:.3,label:"Coastline warp (large)",desc:"Large-scale organic warping of plate boundaries and coastlines."},{key:"warpStr2",def:.05,min:0,max:.15,label:"Coastline warp (detail)",desc:"Fine detail warping. Adds smaller bends and irregularities."},{key:"jagStr",def:.025,min:0,max:.06,label:"Coastline jaggedness",desc:"Sharp, fractal edge detail on coastlines. Higher = more ragged edges."},{key:"penStrength",def:.2,min:0,max:.5,label:"Peninsula strength",desc:"How strongly peninsula features protrude from coastlines."},{key:"bayStrength",def:.18,min:0,max:.5,label:"Bay strength",desc:"How deeply bay features cut into coastlines."}]},mountains:{label:"Mountains",color:"160,140,180",params:[{key:"contContUplift",def:.18,min:.05,max:.35,label:"Cont-cont uplift",desc:"Uplift strength where two continental plates collide. Creates Himalaya-type ranges."},{key:"contOceanUplift",def:.13,min:.03,max:.25,label:"Cont-ocean uplift",desc:"Uplift where ocean plate subducts under continent. Creates Andes-type ranges."},{key:"contContMaxDist",def:60,min:20,max:100,step:1,label:"Cont-cont range",desc:"How far the plateau extends from a cont-cont boundary (in coarse cells). 60 ≈ 1300km."},{key:"contOceanMaxDist",def:25,min:8,max:50,step:1,label:"Cont-ocean range",desc:"How far coastal mountains extend inland. 25 ≈ 550km."},{key:"contContFlatCore",def:10,min:0,max
