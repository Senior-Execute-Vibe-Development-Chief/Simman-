n."},{key:"peaksMult",def:2,min:.5,max:5,label:"Peak height mult",desc:"Height multiplier for ridgeline peaks at plate boundaries."},{key:"mtnBumpStr",def:.1,min:0,max:.25,label:"Mountain bumpiness",desc:"Noisy texture within mountain zones. Higher = more variation between peaks and valleys."}]},moisture:{label:"Moisture",color:"100,160,180",params:[{key:"moistDecay",def:.993,min:.95,max:1,label:"Inland retention",desc:"How much atmospheric moisture survives per transport step over land. Lower = faster continental drying. Higher = moisture penetrates deeper inland."},{key:"moistRecycling",def:.25,min:0,max:.5,label:"Transpiration recycling",desc:"How much precipitation on warm land re-evaporates back into the atmosphere. Amazon recycles ~40% of its rainfall. Higher = wetter continental interiors."},{key:"moistAdvectWeight",def:.6,min:.2,max:1,label:"Advection reach",desc:"How far wind carries moisture per step. Higher = moisture transported further from ocean sources. Affects how deep inland moisture penetrates."},{key:"moistOceanWeight",def:.2,min:0,max:.5,label:"Ocean evaporation",desc:"Intensity of ocean evaporation. Higher = more moisture enters the atmosphere from warm oceans, creating wetter downwind coastlines."},{key:"moistTerrainBlock",def:.4,min:0,max:.9,label:"Orographic strength",desc:"How strongly rising terrain forces precipitation. Higher = stronger rain shadows behind mountains. Controls windward rain vs leeward dryness."},{key:"moistElevDry",def:2,min:0,max:5,label:"Elevation drying",desc:"How much altitude reduces air moisture capacity. Cold thin air at altitude holds less water. Higher = drier mountain tops."},{key:"moistSteps",def:90,min:30,max:150,label:"Transport steps",desc:"Number of advection iterations. More steps = moisture penetrates deeper inland from ocean sources. Also affects generation speed."},{key:"moistConvective",def:.04,min:0,max:.15,label:"Convective rainfall",desc:"How strongly hot land triggers convective precipitation. Domin
